services:
  - type: web
    name: simplescript-compiler
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -w 2 -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: "/health"
    autoDeploy: true